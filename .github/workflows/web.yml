name: Web Build & Deploy

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; a newer release supersedes queued work.
concurrency:
  group: pages
  cancel-in-progress: true

env:
  BUILD_REF: ${{ github.event.release.tag_name || github.ref }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Set up Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.74

      - name: Fetch dependencies
        run: python3 fetch_repos.py

      - name: Configure (Web / Emscripten)
        run: >
          emcmake cmake -B build/web
          -DRIDGEDASH_RAYLIB_PLATFORM=Web
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/web -j$(nproc)

      # The CMake dist target copies index.html + .js/.wasm/.data to dist/.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
